services:
  postgres:
    image: postgres:15
    container_name: campaign-manager-db
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: password
      POSTGRES_DB: campaign_manager
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d campaign_manager"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: campaign-manager-api
    environment:
      - DATABASE_URL=postgresql://root:password@postgres:5432/campaign_manager
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=campaign_manager
      - DB_USER=root
      - DB_PASSWORD=password
      - PORT=3001
      - JWT_SECRET=supersecret_change_in_production
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:3001
    container_name: campaign-manager-web
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3001
      - API_INTERNAL_URL=http://api:3001
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres_data:
